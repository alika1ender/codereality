<style>
  :root {
    --brand-purple: #7C2BF7;
    --brand-indigo: #5B47F7;
    --brand-blue:   #2B6FF7;
    --ink:          #0a0a0c;
    --silver:       #f2f3f5;
    --display-font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;

    /* Hero canvas colors — driven by Mood tweak */
    --hero-bg:        #f5f6f8;
    --hero-fade-stop: 245,246,248;
    --hero-text:      #0a0a0c;
    --hero-text-sub:  #3a3a3d;
    --hero-overlay:   transparent;

    /* Capabilities section — driven by Mood tweak */
    --caps-base-1:    #0a0820;
    --caps-base-2:    #07061a;
    --caps-base-3:    #050511;
  }
  html, body { background: #000; color: #fff; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.01em;
  }
  ::selection { background: rgba(124,43,247,0.25); color: inherit; }

  /* --- Apple-style display type --- */
  .apple-display {
    font-family: var(--display-font);
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 1.02; /* tight, but room for descenders */
    padding-bottom: 0.06em;
  }
  /* Editorial voice tightens differently */
  .voice-editorial .apple-display {
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1.0;
  }
  .voice-editorial .apple-display .grad-text { font-style: italic; }
  .voice-mono .apple-display {
    font-weight: 500;
    letter-spacing: -0.05em;
    line-height: 1.05;
    text-transform: lowercase;
  }
  .apple-eyebrow {
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-size: 12px;
  }

  /* Brand gradient text */
  .grad-text {
    background: linear-gradient(95deg, var(--brand-purple) 0%, var(--brand-indigo) 45%, var(--brand-blue) 100%);
    -webkit-background-clip: text;
            background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    /* Tight line height + small bottom padding keeps lines close while leaving
       just enough room so the text-clip mask doesn’t crop g, y, p, q. */
    line-height: 1.12;
    padding: 0 0.04em 0.08em 0.04em;
    overflow: visible;
    -webkit-box-decoration-break: clone;
            box-decoration-break: clone;
  }

  /* ---------- Liquid glass (white-tinted, works on light & dark) ---------- */
  .liquid-glass {
    background: rgba(255,255,255,0.01);
    background-blend-mode: luminosity;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    border: none;
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
    position: relative;
    overflow: hidden;
  }
  .liquid-glass::before {
    content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1.4px;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.15) 20%,
      rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,
      rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.45) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
  }
  .liquid-glass-strong {
    background: rgba(255,255,255,0.01);
    background-blend-mode: luminosity;
    backdrop-filter: blur(50px);
    -webkit-backdrop-filter: blur(50px);
    border: none;
    box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(255,255,255,0.15);
    position: relative; overflow: hidden;
  }
  .liquid-glass-strong::before {
    content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1.4px;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.2) 20%,
      rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,
      rgba(255,255,255,0.2) 80%, rgba(255,255,255,0.5) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
  }

  /* Dark glass variant for light hero — uses ink-toned border instead */
  .liquid-glass-dark {
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(18px) saturate(1.2);
    -webkit-backdrop-filter: blur(18px) saturate(1.2);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.7), 0 1px 2px rgba(0,0,0,0.04);
    position: relative; overflow: hidden;
  }
  .liquid-glass-dark::before {
    content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1px;
    background: linear-gradient(180deg, rgba(0,0,0,0.15), rgba(0,0,0,0.04) 40%, rgba(0,0,0,0.02) 60%, rgba(0,0,0,0.12));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
  }

  /* Hero — full-bleed Quest 3 image background; text sits in lower half */
  .hero-bg {
    position: absolute; inset: 0; z-index: 0;
    background-image: url('assets/quest.jpg');
    background-repeat: no-repeat;
    background-position: center 28%;
    background-size: cover;
  }
  /* Mood-driven color overlay across the entire headset image. Soft tint for
     Twilight, full dark wash for Midnight, transparent for Daylight. */
  .hero-tint {
    position: absolute; inset: 0; z-index: 1; pointer-events: none;
    background: var(--hero-overlay);
    transition: background 600ms ease;
  }
  .hero-fade-bottom {
    position: absolute; left: 0; right: 0; bottom: 0; height: 60%; z-index: 1;
    background: linear-gradient(180deg,
      rgba(var(--hero-fade-stop),0) 0%,
      rgba(var(--hero-fade-stop),0.55) 45%,
      rgba(var(--hero-fade-stop),0.92) 75%,
      rgba(var(--hero-fade-stop),1) 100%);
    pointer-events: none;
    transition: background 600ms ease;
  }
  .hero-fade-top {
    position: absolute; inset: 0 0 auto 0; height: 140px; z-index: 1;
    background: linear-gradient(180deg, rgba(var(--hero-fade-stop),0.6) 0%, rgba(var(--hero-fade-stop),0) 100%);
    pointer-events: none;
    transition: background 600ms ease;
  }
  /* Soft dark halo only under the subheading so white text reads on silver */
  .subhead-halo {
    position: relative;
    display: inline-block;
    padding: 6px 14px;
    border-radius: 14px;
  }
  .subhead-halo::before {
    content: ""; position: absolute; inset: -2px; border-radius: inherit; z-index: -1;
    background: radial-gradient(60% 100% at 50% 50%, rgba(10,8,30,0.55) 0%, rgba(10,8,30,0) 75%);
    filter: blur(8px);
  }

  /* Capabilities bg — brand-driven blooms over mood-driven base */
  .caps-bg {
    position: absolute; inset: 0; z-index: 0;
    transition: background 600ms ease;
    background:
      radial-gradient(60% 50% at 18% 18%, color-mix(in srgb, var(--brand-purple) 55%, transparent) 0%, transparent 60%),
      radial-gradient(55% 45% at 85% 85%, color-mix(in srgb, var(--brand-blue) 55%, transparent) 0%, transparent 60%),
      radial-gradient(80% 70% at 50% 50%, color-mix(in srgb, var(--brand-indigo) 18%, transparent) 0%, transparent 70%),
      linear-gradient(160deg, var(--caps-base-1) 0%, var(--caps-base-2) 50%, var(--caps-base-3) 100%);
  }
  .caps-grain {
    position: absolute; inset: 0; z-index: 1; pointer-events: none; opacity: 0.5;
    background:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4) 50%, transparent 51%),
      radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.25) 50%, transparent 51%),
      radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,0.18) 50%, transparent 51%);
    mix-blend-mode: screen;

    background: linear-gradient(135deg, rgba(124,43,247,0.18), rgba(43,111,247,0.18));
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18);
  }

  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }
</style>

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

/* ---------- BlurText ---------- */
function BlurText({ text, className = "", as = "p", style = {}, wordClassName = "", wordStyle = {} }) {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {if (e.isIntersecting) {setInView(true);io.disconnect();}});
    }, { threshold: 0.1 });
    io.observe(ref.current);
    return () => io.disconnect();
  }, []);
  const words = useMemo(() => text.split(" "), [text]);
  const Tag = motion[as] || motion.p;
  return (
    <Tag
      ref={ref}
      className={className}
      style={{ display: "flex", flexWrap: "wrap", justifyContent: "center", rowGap: "0.05em", ...style }}>
      
      {words.map((w, i) =>
      <motion.span
        key={i}
        className={wordClassName}
        initial={{ filter: "blur(10px)", opacity: 0, y: 50 }}
        animate={inView ? {
          filter: ["blur(10px)", "blur(5px)", "blur(0px)"],
          opacity: [0, 0.5, 1],
          y: [50, -5, 0]
        } : {}}
        transition={{ duration: 0.75, times: [0, 0.5, 1], ease: "easeOut", delay: i * 0.08 }}
        style={{ display: "inline-block", marginRight: "0.22em", ...wordStyle }}>

        </motion.span>
      )}
    </Tag>);

}

};

const VOICES = {
  System: '-apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif',
  Editorial: '"Instrument Serif", "Times New Roman", Georgia, serif',
  Mono: 'ui-monospace, "SF Mono", SFMono-Regular, Menlo, Monaco, "JetBrains Mono", monospace'
};

const VOICE_CLASS = { System: "voice-system", Editorial: "voice-editorial", Mono: "voice-mono" };

/* ---------- App ---------- */
function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULS);

  // Load Instrument Serif lazily, only when Editorial is picked
  useEffect(() => {
    if (t.voice !== "Editorial") return;
    if (document.getElementById("twk-editorial-font")) return;
    const link = document.createElement("link");
    link.id = "twk-editorial-font";
    link.rel = "stylesheet";
    link.href = "https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap";
    document.head.appendChild(link);
  }, [t.voice]);

  const pal = Array.isArray(t.palette) && t.palette.length === 3 ? t.palette : PALETTES[0];
  const mood = MOODS[t.mood] || MOODS.Daylight;
  const voiceClass = VOICE_CLASS[t.voice] || "voice-system";

  const cssVars = {
    "--brand-purple": pal[0],
    "--brand-indigo": pal[1],
    "--brand-blue": pal[2],
    "--display-font": VOICES[t.voice] || VOICES.System,
    ...mood
  };

  return (
    <main className={`text-white ${voiceClass}`} style={cssVars}>
      <Hero />
      <Capabilities />

      <TweaksPanel>
        <TweakSection label="Palette" />
        <TweakColor
          label="Brand"
          value={t.palette}
          options={PALETTES}
          onChange={(v) => setTweak("palette", v)} />
        

        <TweakSection label="Hero Mood" />
        <TweakRadio
          label="Atmosphere"
          value={t.mood}
          options={["Daylight", "Twilight", "Midnight"]}
          onChange={(v) => setTweak("mood", v)} />
        

        <TweakSection label="Voice" />
        <TweakRadio
          label="Headline"
          value={t.voice}
          options={["System", "Editorial", "Mono"]}
          onChange={(v) => setTweak("voice", v)} />
        
      </TweaksPanel>
    </main>);

}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
