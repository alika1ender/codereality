  .liquid-glass {

    border: none;

  .liquid-glass::before {
    content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1.4px;

      rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.15) 20%,
      rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,

  .liquid-glass-strong {

    backdrop-filter: blur(50px);

    -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
  }

/* ---------- BlurText ---------- */
function BlurText({ text, className = "", as = "p", style = {}, wordClassName = "", wordStyle = {} }) {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {if (e.isIntersecting) {setInView(true);io.disconnect();}});
    }, { threshold: 0.1 });
    io.observe(ref.current);
    return () => io.disconnect();
  }, []);
  const words = useMemo(() => text.split(" "), [text]);
  const Tag = motion[as] || motion.p;
  return (
    <Tag
      ref={ref}
      className={className}
      style={{ display: "flex", flexWrap: "wrap", justifyContent: "center", rowGap: "0.05em", ...style }}>
      
      {words.map((w, i) =>
      <motion.span
        key={i}
        className={wordClassName}
        initial={{ filter: "blur(10px)", opacity: 0, y: 50 }}
        animate={inView ? {
          filter: ["blur(10px)", "blur(5px)", "blur(0px)"],
          opacity: [0, 0.5, 1],
          y: [50, -5, 0]
        } : {}}
        transition={{ duration: 0.75, times: [0, 0.5, 1], ease: "easeOut", delay: i * 0.08 }}
        style={{ display: "inline-block", marginRight: "0.22em", ...wordStyle }}>
        
          {w}
        </motion.span>
      )}
    </Tag>);

}

          animate={{ opacity: 1, y: 0 }}
          transition={{ duration: 0.7, ease: "easeOut" }}
          className="apple-eyebrow text-ink-500 mb-5 text-center"
        >
          Projects
        </motion.div>

        <BlurText
          as="h1"
          text="Selected work, shipped to production."
          className="apple-display text-ink-900 text-[40px] sm:text-5xl md:text-6xl lg:text-[80px] max-w-[16ch] mx-auto text-center"
        />

        <motion.p
          initial={{ opacity: 0, y: 12 }}
          animate={{ opacity: 1, y: 0 }}
          transition={{ duration: 0.7, ease: "easeOut", delay: 0.9 }}
          className="mt-8 text-[16px] md:text-[18px] text-ink-500 max-w-[60ch] mx-auto text-center leading-snug"
        >
          A short selection of immersive projects and showcases we've shipped, from live events to in-house VR games.
        </motion.p>

        <div className="grid grid-cols-1 md:grid-cols-2 gap-12 md:gap-x-10 md:gap-y-16 mt-20 md:mt-24">
          {PROJECTS.map((p, i) => (
            <ProjectRow key={i} p={p} idx={i} />
          ))}
        </div>
      </section>
    </main>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
