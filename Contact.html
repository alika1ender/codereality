    -webkit-box-decoration-break: clone;
            box-decoration-break: clone;

  /* ---------- Liquid glass (white-tinted, works on light & dark) ---------- */
  .liquid-glass {
    background: rgba(255,255,255,0.01);
    background-blend-mode: luminosity;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    border: none;
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
    position: relative;
    overflow: hidden;
  }
  .liquid-glass::before {
    content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1.4px;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.15) 20%,
      rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,
      rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.45) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
  }
  .liquid-glass-strong {
    background: rgba(255,255,255,0.01);
    background-blend-mode: luminosity;
    backdrop-filter: blur(50px);
    -webkit-backdrop-filter: blur(50px);
    border: none;
    box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(255,255,255,0.15);
    position: relative; overflow: hidden;
  }
  .liquid-glass-strong::before {
    content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1.4px;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.2) 20%,
      rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,
      rgba(255,255,255,0.2) 80%, rgba(255,255,255,0.5) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
  }

  /* Dark glass variant for light hero — uses ink-toned border instead */
  .liquid-glass-dark {
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(18px) saturate(1.2);
    -webkit-backdrop-filter: blur(18px) saturate(1.2);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.7), 0 1px 2px rgba(0,0,0,0.04);
    position: relative; overflow: hidden;

    background: linear-gradient(180deg,

      rgba(245,246,248,0.55) 45%,
      rgba(245,246,248,0.92) 75%,
      rgba(245,246,248,1) 100%);

/* ---------- BlurText ---------- */
function BlurText({ text, className = "", as = "p", style = {}, wordClassName = "", wordStyle = {} }) {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => { if (e.isIntersecting) { setInView(true); io.disconnect(); } });
    }, { threshold: 0.1 });
    io.observe(ref.current);
    return () => io.disconnect();
  }, []);
  const words = useMemo(() => text.split(" "), [text]);
  const Tag = motion[as] || motion.p;
  return (
    <Tag
      ref={ref}
      className={className}
      style={{ display: "flex", flexWrap: "wrap", justifyContent: "center", rowGap: "0.05em", ...style }}
    >
      {words.map((w, i) => (
        <motion.span
          key={i}
          className={wordClassName}
          initial={{ filter: "blur(10px)", opacity: 0, y: 50 }}
          animate={inView ? {
            filter: ["blur(10px)", "blur(5px)", "blur(0px)"],
            opacity: [0, 0.5, 1],
            y: [50, -5, 0],
          } : {}}
          transition={{ duration: 0.75, times: [0, 0.5, 1], ease: "easeOut", delay: i * 0.08 }}
          style={{ display: "inline-block", marginRight: "0.22em", ...wordStyle }}
        >
          {w}
        </motion.span>
      ))}
    </Tag>
  );
}

/* ---------- Logo mark ---------- */

    { label: "Who We Are", href: "Who We Are.html" },

  const activeColor = light ? "text-ink-900" : "text-white";
  const glassClass = light ? "liquid-glass-dark" : "liquid-glass";
  return (
    <nav className="fixed top-4 left-0 right-0 z-50 px-4 sm:px-6 lg:px-12">
      <div className="flex items-center justify-between">
        {/* Logo */}
        <a href="Code Reality.html" className={`${glassClass} rounded-full h-11 px-3 flex items-center gap-2`}>
          <CRMark size={26} />
          <span className={`text-[15px] font-semibold tracking-tight ${light ? 'text-ink-900' : 'text-white'}`}>
            CodeReality
          </span>
        </a>

        {/* Center pill — desktop */}
        <div className={`hidden md:flex ${glassClass} rounded-full px-1.5 py-1.5 items-center gap-0.5`}>
          {links.map((l, i) => (
            <a
              key={i}
              href={l.href}
              className={`px-4 py-1.5 text-[13px] font-medium rounded-full transition-opacity ${current === l.label ? activeColor : textColor} hover:opacity-80`}
            >
              {l.label}
            </a>
          ))}
        </div>

        {/* Hamburger — mobile */}
        <button
          onClick={() => setMenuOpen(!menuOpen)}
          className={`md:hidden ${glassClass} rounded-full h-11 w-11 flex items-center justify-center`}
          aria-label="Toggle menu"
        >
          <svg className={`h-5 w-5 ${light ? 'text-ink-900' : 'text-white'}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">

        {/* Right spacer — desktop only */}

      {menuOpen && (
        <motion.div
          initial={{ opacity: 0, y: -8 }}

          transition={{ duration: 0.2, ease: "easeOut" }}
          className={`md:hidden mt-3 ${glassClass} rounded-[18px] px-2 py-2 flex flex-col gap-0.5`}

          {links.map((l, i) => (

              {l.label}
            </a>
          ))}
        </motion.div>
      )}
    </nav>
  );
}

function Field({ label, type = "text", placeholder, area = false, name }) {

}
